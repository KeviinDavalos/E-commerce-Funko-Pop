<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/fe9dfb9ca0.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <title>Contacto</title>
</head>
<body>
    <header>
        <div class="div-logo">
            <a class="logo" href="../index.html">FUNKO POP</a>
        </div>
        <nav class="header-nav">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
                <li><a href="./carrito.html" class="carrito-icono">
                    <i class="fa-solid fa-cart-shopping"></i> <span id="contador-carrito">0</span>
                </a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="conteiner-contacto">
            <h1 class="titulo-contacto">Contáctanos</h1>
            <p>¿Tenes una pregunta sobre un artículo de colección? Escribinos</p>
            <form class="form-contacto" action="https://formspree.io/f/mrewdabg" method="POST">
                <div class="grupo-input">
                    <label for="email">Email:</label>
                    <input id="email" type="email" name="email" placeholder="Email">
                </div>
                <div class="grupo-input">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Mensaje"></textarea>
                </div>
                <button class="btn btn-contacto" type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Sitio realizado por Kev para Talento Tech</p>
        <nav>
            <ul class="footer-list">
                <li><i class="fa-brands fa-instagram"></i></li>
                <li><i class="fa-brands fa-facebook"></i></li>
            </ul>
        </nav>
    </footer>
    <script type="module" src="../js/contacto.js"></script>
</body>
</html>
